name: Update Nix flake.lock

on:
  schedule:
    - cron: '0 3,9,15,21 * * *' # Every 6 hours (UTC)

  workflow_dispatch:

# zizmor: ignore[concurrency-limits]

permissions: {}

jobs:
  update-flake-lock:
    name: Update Nix flake.lock
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions: {}
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-metadata: read
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Setup Git
        id: setup-git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          app_name: '${{ steps.app-token.outputs.app-slug }}[bot]'
        run: |
          app_user_id="$(gh api "/users/${app_name}" --jq '.id')"
          app_email="${app_user_id}+${app_name}@users.noreply.github.com"
          echo "name=${app_name}" >> "$GITHUB_OUTPUT"
          echo "email=${app_email}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          fetch-depth: 1

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919 # v3.17.1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          extra-conf: |
            extra-substituters = https://nix-cache.taiy.me
            extra-trusted-substituters = https://nix-cache.taiy.me
            extra-trusted-public-keys = nix-cache.taiy.me:Wv1ThvtQj0/bCIgCGYqWgRb49VGUuFmWtpUcc8Oqi+E=

      - name: Get current date
        id: date
        run: |
          current_date="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') JST"
          echo "current-date=${current_date}" >> "$GITHUB_OUTPUT"

      - name: Get trigger label
        id: trigger
        run: |
          case "$GITHUB_EVENT_NAME" in
            schedule)
              trigger_label="by cron"
              ;;
            workflow_dispatch)
              trigger_label="by manual trigger"
              ;;
            *)
              trigger_label="by ${GITHUB_EVENT_NAME} event"
              ;;
          esac
          echo "trigger-label=${trigger_label}" >> "$GITHUB_OUTPUT"

      - name: Update Nix flake.lock
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        env:
          commit_msg: 'chore(deps): update nix flake.lock'
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          assign_and_review: taiyme
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: update-flake-lock
          commit-msg: ${{ env.commit_msg }}
          pr-title: ${{ env.commit_msg }}
          pr-body: |
            Auto-generated by the [${{ github.workflow }}](${{ env.run_url }}) workflow.

            Generated on ${{ steps.date.outputs.current-date }} (${{ steps.trigger.outputs.trigger-label }}).

            ```
            {{ env.GIT_COMMIT_MESSAGE }}
            ```
          pr-labels: dependencies
          pr-assignees: ${{ env.assign_and_review }}
          pr-reviewers: ${{ env.assign_and_review }}
          git-author-name: ${{ steps.setup-git.outputs.name }}
          git-author-email: ${{ steps.setup-git.outputs.email }}
          git-committer-name: ${{ steps.setup-git.outputs.name }}
          git-committer-email: ${{ steps.setup-git.outputs.email }}
