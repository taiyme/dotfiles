name: Update Nix flake.lock

on:
  schedule:
    - cron: '0 15 * * *'

  workflow_dispatch:

concurrency:
  group: >-
    ${{ github.workflow }}-
    ${{ github.repository }}-
    ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-flake-lock:
    name: Update Nix flake.lock
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions: {}
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-metadata: read
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Generate git identity
        id: git-identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          app_name: '${{ steps.app-token.outputs.app-slug }}[bot]'
        run: |
          app_user_id="$(gh api "/users/${app_name}" --jq '.id')"
          app_email="${app_user_id}+${app_name}@users.noreply.github.com"
          echo "name=${app_name}" >> "$GITHUB_OUTPUT"
          echo "email=${app_email}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          fetch-depth: 1

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@73327eb48f028efaaf5013656ba216ca3cdeca7b # v3.16.3
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          extra-conf: |
            extra-substituters = https://nix-cache.taiy.me
            extra-trusted-substituters = https://nix-cache.taiy.me
            extra-trusted-public-keys = nix-cache.taiy.me:Wv1ThvtQj0/bCIgCGYqWgRb49VGUuFmWtpUcc8Oqi+E=

      - name: Update Nix flake.lock
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: update-flake-lock
          commit-msg: 'chore(deps): update nix flake.lock'
          pr-title: 'chore(deps): update nix flake.lock'
          pr-body: |
            Generated by the [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

            ```
            {{ env.GIT_COMMIT_MESSAGE }}
            ```
          pr-labels: dependencies
          pr-assignees: taiyme
          pr-reviewers: taiyme
          git-author-name: ${{ steps.git-identity.outputs.name }}
          git-author-email: ${{ steps.git-identity.outputs.email }}
          git-committer-name: ${{ steps.git-identity.outputs.name }}
          git-committer-email: ${{ steps.git-identity.outputs.email }}
